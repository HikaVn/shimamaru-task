<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="しままる漢字">
<meta name="theme-color" content="#eaf3ff">
<title>しままる漢字 ― 読みのぼうけん</title>
<style>
:root{
  --ink:#23314a; --plum:#3a5a8a; --sky:#5b8bd9; --sky-soft:#a9c8f0;
  --mint:#51c878; --gold:#f4a900; --rose:#e8629a; --muted:#8a96ac;
  --card:#fff; --shadow:0 6px 22px rgba(91,139,217,.14);
  --hud-h:54px; --nav-h:66px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Hiragino Maru Gothic Pro','BIZ UDPGothic',sans-serif;
  background:linear-gradient(160deg,#eaf3ff 0%,#f3f8ff 45%,#eafaf1 100%);
  background-attachment:fixed;min-height:100vh;color:var(--ink);
  padding:calc(var(--hud-h) + env(safe-area-inset-top)) 0 calc(var(--nav-h) + 16px + env(safe-area-inset-bottom));
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(.7)}70%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shakeNo{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(540deg);opacity:.2}}
@keyframes floatUp{from{opacity:1;transform:translate(-50%,0)}to{opacity:0;transform:translate(-50%,-44px)}}
@keyframes chestShake{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}60%{transform:rotate(8deg)}}
.container{max-width:680px;margin:0 auto;padding:0 12px}

.hud{position:fixed;top:0;left:0;right:0;height:calc(var(--hud-h) + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);
  background:rgba(255,255,255,.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 2px 12px rgba(91,139,217,.12);z-index:60;display:flex;align-items:center;padding-left:12px;padding-right:12px}
.hud-inner{max-width:680px;margin:0 auto;width:100%;display:flex;align-items:center;gap:8px}
.hud-back{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:#eef5ff;color:var(--sky);font-size:18px;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 2px 6px rgba(91,139,217,.18)}
.hud-back:active{transform:scale(.92)}
.lv-badge{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#5b8bd9,#a9c8f0);color:#fff;font-weight:900;font-size:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 8px rgba(91,139,217,.4)}
.lv-badge small{font-size:7px;opacity:.9}
.hud-xpwrap{flex:1;min-width:0}
.hud-name{font-size:11px;font-weight:800;color:var(--plum);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hud-xpbar{height:7px;background:#e4eefb;border-radius:20px;overflow:hidden;margin-top:2px}
.hud-xpbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#a9c8f0,#5b8bd9);border-radius:20px;transition:width .4s}
.hud-stat{display:flex;align-items:center;gap:3px;font-weight:800;font-size:13px;color:var(--plum);background:#fff;border-radius:14px;padding:5px 9px;box-shadow:0 2px 6px rgba(91,139,217,.12);flex-shrink:0}

.nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 -3px 16px rgba(91,139,217,.14);z-index:60;display:flex}
.nav-inner{max-width:680px;margin:0 auto;width:100%;display:flex}
.nav-home-link{color:var(--sky);text-decoration:none}
.nav-btn{flex:1;border:none;background:transparent;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#a8badb;font-weight:800;font-size:10px;padding:8px 2px;position:relative}
.nav-btn .ic{font-size:21px;transition:transform .2s}
.nav-btn.active{color:var(--sky)}
.nav-btn.active .ic{transform:translateY(-2px) scale(1.12)}
.nav-btn.active::after{content:"";position:absolute;top:5px;width:32px;height:30px;border-radius:14px;background:#e9f1ff;z-index:-1}

.view{animation:fadeIn .22s ease}
.hidden{display:none !important}
.card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.section-title{font-size:14px;font-weight:900;color:var(--plum);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.muted{color:var(--muted);font-size:12px}

.hero{position:relative;border-radius:24px;padding:18px 16px 14px;margin-bottom:14px;text-align:center;
  background:radial-gradient(120% 80% at 50% -10%,#fbfdff 0%,#e9f1ff 60%,#e3edfb 100%);box-shadow:var(--shadow)}
.hero-avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;border:4px solid #fff;box-shadow:0 6px 16px rgba(58,90,138,.22);animation:bob 4s ease-in-out infinite;background:#dff}
.hero-title{font-size:20px;font-weight:900;color:var(--plum);margin-top:8px;letter-spacing:1px}
.hero-sub{font-size:12px;color:var(--sky);margin-top:4px}
.hero-line{font-size:12.5px;color:var(--rose);font-weight:800;margin-top:8px;min-height:16px}
.overall{display:flex;align-items:center;gap:10px;margin-top:10px}
.overall-bar{flex:1;height:12px;background:#e4eefb;border-radius:20px;overflow:hidden}
.overall-bar>i{display:block;height:100%;background:linear-gradient(90deg,#88e0b2,#51c878);border-radius:20px;transition:width .4s}
.overall-num{font-size:12px;font-weight:900;color:var(--mint);white-space:nowrap}

/* world / stage map */
.world{background:#fff;border-radius:18px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;border:2px solid transparent}
.world.cleared{border-color:#bfe8cd}
.world.locked{opacity:.55}
.world-head{display:flex;align-items:center;gap:13px;padding:14px;cursor:pointer}
.world-emoji{font-size:34px;flex-shrink:0;width:50px;height:50px;display:flex;align-items:center;justify-content:center;background:#eef5ff;border-radius:16px}
.world-mid{flex:1;min-width:0}
.world-name{font-size:15px;font-weight:900;color:var(--ink)}
.world-sub{font-size:11px;color:var(--muted);margin-top:2px}
.world-bar{height:8px;background:#eef2f8;border-radius:20px;overflow:hidden;margin-top:7px}
.world-bar>i{display:block;height:100%;background:linear-gradient(90deg,#a9c8f0,#5b8bd9);border-radius:20px}
.world-right{font-size:11px;font-weight:900;color:var(--sky);flex-shrink:0;text-align:center;display:flex;flex-direction:column;gap:3px;align-items:center}
.world-tre{font-size:11px;color:var(--gold)}
.world-caret{font-size:13px;color:var(--muted);transition:transform .2s}
.world.open .world-caret{transform:rotate(90deg)}
.stages{padding:0 12px 6px;display:none}
.world.open .stages{display:block;animation:fadeIn .2s}
.stage-row{display:flex;align-items:center;gap:11px;padding:11px 8px;border-top:1px dashed #e7eefb;cursor:pointer}
.stage-row.locked{opacity:.5;cursor:not-allowed}
.stage-ic{font-size:22px;width:34px;text-align:center;flex-shrink:0}
.stage-mid2{flex:1;min-width:0}
.stage-nm{font-size:13.5px;font-weight:800;color:var(--ink)}
.stage-meta{font-size:11px;color:var(--muted);margin-top:2px}
.stage-stat{font-size:12px;font-weight:900;flex-shrink:0}
.stage-row.cleared .stage-stat{color:var(--mint)}

.big-btn{width:100%;border:none;border-radius:16px;padding:15px 0;font-family:inherit;font-weight:900;font-size:16px;cursor:pointer;color:#fff;background:linear-gradient(135deg,#5b8bd9,#a9c8f0);box-shadow:0 4px 16px rgba(91,139,217,.3)}
.big-btn.green{background:linear-gradient(135deg,#51c878,#88e0b2);box-shadow:0 4px 16px rgba(81,200,120,.3)}
.big-btn.gold{background:linear-gradient(135deg,#f4a900,#ffcf4d);box-shadow:0 4px 16px rgba(244,169,0,.3)}
.big-btn:active{transform:scale(.98)}
.back-link{display:block;text-align:center;text-decoration:none;margin:6px 0 4px;padding:13px 0;border-radius:16px;background:#fff;border:2px solid #d8e6fa;color:var(--sky);font-weight:900;font-size:14px;box-shadow:var(--shadow)}
.back-link:active{transform:scale(.98)}

/* battle */
.battle-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.battle-prog{flex:1;height:10px;background:#e4eefb;border-radius:20px;overflow:hidden;margin:0 10px}
.battle-prog>i{display:block;height:100%;background:linear-gradient(90deg,#88e0b2,#51c878);border-radius:20px;transition:width .3s}
.battle-x{border:none;background:#eef2f8;color:var(--muted);border-radius:12px;padding:8px 12px;font-family:inherit;font-weight:800;cursor:pointer}
.monster{text-align:center;background:#fff;border-radius:22px;box-shadow:var(--shadow);padding:18px 16px;margin-bottom:14px;animation:popIn .3s}
.monster.boss{background:linear-gradient(135deg,#fff,#fff3f8);border:2px solid #f3c8de}
.monster.treasure{background:linear-gradient(135deg,#fffaf0,#fff);border:2px solid #f4d58a}
.mon-emoji{font-size:54px;animation:bob 3s ease-in-out infinite;display:inline-block}
.mon-tag{display:inline-block;color:#fff;font-size:11px;font-weight:900;border-radius:12px;padding:3px 12px;margin-bottom:6px}
.mon-tag.boss{background:linear-gradient(135deg,#e8629a,#f4a0c4)}
.mon-tag.tre{background:linear-gradient(135deg,#f4a900,#ffcf4d)}
.mon-ask{font-size:12.5px;color:var(--sky);font-weight:800;margin-top:6px}
.mon-word{font-size:46px;font-weight:900;color:var(--ink);letter-spacing:4px;margin:8px 0 4px;line-height:1.2}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.choice{border:2px solid #d8e6fa;background:#fff;color:var(--ink);border-radius:16px;padding:16px 8px;font-family:inherit;font-weight:900;font-size:18px;cursor:pointer;transition:all .12s}
.choice:active{transform:scale(.96)}
.choice.correct{background:#e8f9ef;border-color:#7fdca3;color:#2f9e5c}
.choice.wrong{background:#ffeef0;border-color:#f3b6bf;color:#d65a6b;animation:shakeNo .3s}
.feedback{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px;animation:fadeIn .2s;text-align:center}
.fb-good{color:var(--mint);font-weight:900;font-size:16px}
.fb-bad{color:var(--rose);font-weight:900;font-size:15px}
.fb-read{font-size:22px;font-weight:900;color:var(--ink);margin:6px 0}
.fb-mean{font-size:13px;color:var(--muted)}
.fb-tre{margin-top:10px;background:#fffaf0;border:1px dashed #f4d58a;border-radius:12px;padding:8px;color:#b8860b;font-weight:900;font-size:13px;animation:popIn .3s}
.fb-next{margin-top:12px}

.result{text-align:center;background:#fff;border-radius:22px;box-shadow:var(--shadow);padding:24px 18px;animation:popIn .3s}
.result-emoji{font-size:60px}
.result-title{font-size:20px;font-weight:900;color:var(--plum);margin-top:8px}
.result-story{font-size:13.5px;color:var(--ink);line-height:1.7;margin:12px 0;background:#f3f8ff;border-radius:14px;padding:12px}
.result-reward{font-size:14px;font-weight:900;color:var(--gold);margin:10px 0}
.tre-card{background:linear-gradient(135deg,#fffaf0,#fff);border:2px solid #f4d58a;border-radius:18px;padding:14px;margin:12px 0;animation:popIn .35s}
.tre-chest{font-size:40px;animation:chestShake .5s}
.tre-emoji{font-size:46px}
.tre-name{font-size:16px;font-weight:900;color:#b8860b;margin-top:4px}
.tre-desc{font-size:12px;color:var(--muted);margin-top:4px}
.tre-kira{font-size:12px;font-weight:900;color:var(--rose);margin-top:4px}

/* study & treasures */
.seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.seg-btn{border:none;border-radius:18px;cursor:pointer;font-family:inherit;font-weight:800;font-size:12.5px;padding:8px 12px;background:#e9f1ff;color:var(--sky)}
.seg-btn.active{background:var(--sky);color:#fff}
.kanji-row{display:flex;align-items:center;gap:12px;padding:11px 6px}
.kanji-row+.kanji-row{border-top:1px solid #eef2f8}
.kr-word{font-size:23px;font-weight:900;color:var(--ink);min-width:70px}
.kr-mid{flex:1;min-width:0}
.kr-read{font-size:15px;font-weight:800;color:var(--sky)}
.kr-mean{font-size:12px;color:var(--muted);margin-top:2px}
.kr-mark{font-size:20px;flex-shrink:0}
.toggle-furi{border:none;border-radius:12px;background:#eef5ff;color:var(--sky);font-family:inherit;font-weight:800;font-size:12px;padding:8px 12px;cursor:pointer}
.read-hidden{filter:blur(6px)}
.tre-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px}
.tre-cell{border-radius:16px;padding:12px 6px;text-align:center;background:#faf7ee;border:2px solid #f1e6cf;position:relative}
.tre-cell.locked{opacity:.5;background:#f3f5f8;border-color:#e7eef5}
.tre-cell .e{font-size:32px;line-height:1.1}
.tre-cell.locked .e{filter:grayscale(1) brightness(1.2)}
.tre-cell .n{font-size:11px;font-weight:800;color:var(--ink);margin-top:4px}
.tre-cell .k{position:absolute;top:4px;right:6px;font-size:13px}

.footer{text-align:center;margin:16px 0 6px;font-size:11.5px;color:var(--muted);line-height:1.6}

#toast-area{position:fixed;left:50%;bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:90%;max-width:360px}
.toast{background:rgba(35,49,74,.94);color:#fff;border-radius:16px;padding:11px 18px;font-size:13.5px;font-weight:800;box-shadow:0 6px 20px rgba(0,0,0,.25);animation:fadeIn .25s;display:flex;align-items:center;gap:8px}
.float-gain{position:fixed;z-index:2100;font-weight:900;font-size:15px;pointer-events:none;animation:floatUp 1s ease-out forwards;text-shadow:0 1px 3px rgba(255,255,255,.8)}
#confetti-area{position:fixed;inset:0;pointer-events:none;z-index:1900;overflow:hidden}
.confetti{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;animation:confettiFall linear forwards}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important}.confetti{display:none}}
@media (max-width:380px){.choices{grid-template-columns:1fr 1fr}.mon-word{font-size:38px}}
</style>
</head>
<body>

<div class="hud">
  <div class="hud-inner">
    <a class="hud-back" href="https://hikavn.github.io/shimamaru-task/" title="しままるタスクへ もどる">🏠</a>
    <div class="lv-badge"><small>Lv</small><span id="hud-level">1</span></div>
    <div class="hud-xpwrap">
      <div class="hud-name">しままる（よみびと）</div>
      <div class="hud-xpbar"><i id="hud-xp"></i></div>
    </div>
    <div class="hud-stat">📖<span id="hud-read">0</span></div>
    <div class="hud-stat">💎<span id="hud-tre">0</span></div>
  </div>
</div>

<div class="container">

  <!-- MAP -->
  <div id="map-view" class="view">
    <div class="hero">
      <img src="../shimamaru.jpg" class="hero-avatar" alt="しままる" onerror="this.replaceWith(Object.assign(document.createElement('div'),{textContent:'🐦',style:'font-size:64px'}))">
      <div class="hero-title">しままる漢字</div>
      <div class="hero-sub">せいかつで つかう漢字を よめるように 🗺️</div>
      <div class="hero-line" id="hero-line"></div>
      <div class="overall">
        <div class="overall-bar"><i id="overall-bar"></i></div>
        <div class="overall-num" id="overall-num">0%</div>
      </div>
    </div>
    <div class="section-title">🗺️ ワールドを えらぼう</div>
    <div id="world-list"></div>
    <a class="back-link" href="https://hikavn.github.io/shimamaru-task/">🏠 しままるタスクへ もどる</a>
    <div class="footer">
      ※ レベルは やさしい→むずかしい の目安。1ステージ＝10語、各ステージに かくれた おたから あり💎<br>
      まちがえても だいじょうぶ。何度でも であって よめるようになろう！🐦
    </div>
  </div>

  <!-- BATTLE -->
  <div id="battle-view" class="view hidden">
    <div class="battle-top">
      <button class="battle-x" onclick="quitBattle()">やめる</button>
      <div class="battle-prog"><i id="battle-prog"></i></div>
      <div class="hud-stat" style="box-shadow:none;background:#eef5ff">⭐<span id="battle-score">0</span></div>
    </div>
    <div id="battle-body"></div>
  </div>

  <!-- RESULT -->
  <div id="result-view" class="view hidden"><div id="result-body"></div></div>

  <!-- STUDY -->
  <div id="study-view" class="view hidden">
    <div class="section-title">📚 漢字ずかん（よみを おぼえよう）</div>
    <div class="seg" id="study-seg"></div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div class="muted" id="study-count"></div>
        <button class="toggle-furi" onclick="toggleFuri()" id="furi-btn">よみを かくす</button>
      </div>
      <div id="study-list"></div>
    </div>
  </div>

  <!-- TREASURES -->
  <div id="treasure-view" class="view hidden">
    <div class="section-title">💎 おたから コレクション</div>
    <div class="card">
      <div class="muted" id="tre-count" style="margin-bottom:10px"></div>
      <div class="tre-grid" id="tre-grid"></div>
    </div>
    <div class="footer">ステージを クリアすると おたからGET。パーフェクト（ぜんもん正解）で ✨キラ✨ に！</div>
  </div>

  <!-- REVIEW -->
  <div id="review-view" class="view hidden">
    <div class="hero">
      <div class="result-emoji">🔁</div>
      <div class="hero-title" style="font-size:18px">ふくしゅう どうじょう</div>
      <div class="hero-sub" id="review-info"></div>
    </div>
    <button class="big-btn green" id="review-start" onclick="startReview()">にがてな漢字を ふくしゅうする</button>
    <div class="footer">まちがえた・あやしい漢字を あつめて 出題するよ。</div>
  </div>

</div>

<nav class="nav">
  <div class="nav-inner">
    <button class="nav-btn active" id="nav-map" onclick="go('map')"><span class="ic">🗺️</span>ぼうけん</button>
    <button class="nav-btn" id="nav-study" onclick="go('study')"><span class="ic">📚</span>ずかん</button>
    <button class="nav-btn" id="nav-treasure" onclick="go('treasure')"><span class="ic">💎</span>おたから</button>
    <button class="nav-btn" id="nav-review" onclick="go('review')"><span class="ic">🔁</span>ふくしゅう</button>
    <a class="nav-btn nav-home-link" href="https://hikavn.github.io/shimamaru-task/" title="しままるタスクのホームへ"><span class="ic">🏠</span>タスク</a>
  </div>
</nav>

<div id="confetti-area"></div>
<div id="toast-area"></div>

<script>
/* =========================================================
   しままる漢字 ― ワールド→ステージの2階層・おたから付きRPG
   ・やさしく罰しない／読みは熟語で出題（生活で つかう ことば／レベルは目安）
   ========================================================= */
const TREASURES = {
  t1:{e:'🍀',n:'よつばのクローバー',d:'みどりの森の さいわい'},
  t2:{e:'🌰',n:'きんのどんぐり',d:'ぴかぴか かがやく どんぐり'},
  t3:{e:'💧',n:'いずみのしずく',d:'もりの おくの ひとしずく'},
  t4:{e:'🪶',n:'かぜのはね',d:'かるく まう かぜの はね'},
  t5:{e:'🍃',n:'みどりのおまもり',d:'丘で ひろった おまもり'},
  t6:{e:'🎐',n:'すずのね',d:'すずしい 音色の かざり'},
  t7:{e:'🐚',n:'みずうみの貝',d:'しずかな 湖の 貝がら'},
  t8:{e:'🔱',n:'みずのつえ',d:'水を あやつる つえ'},
  t9:{e:'💠',n:'しずくのほうせき',d:'青く かがやく 宝石'},

const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function load(){ try{ const r=localStorage.getItem(STORAGE_KEY); if(!r) return defaultState(); return Object.assign(defaultState(), JSON.parse(r)); }catch(e){ return defaultState(); } }
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); }

/* ---- data helpers ---- */
function worldById(id){ return WORLDS.find(w=>w.id===id); }
function allStages(){ return WORLDS.flatMap(w=>w.stages.map(s=>({...s, world:w.id}))); }
function stageById(id){ for(const w of WORLDS){ const s=w.stages.find(x=>x.id===id); if(s) return {...s, world:w.id}; } return null; }
function worldItems(w){ return w.stages.flatMap(s=>s.items); }
function allItems(){ return WORLDS.flatMap(w=>w.stages.flatMap(s=>s.items.map(it=>({...it})))); }
function totalCount(){ return allItems().length; }
function masteredCount(){ return Object.keys(S.mastered).length; }
function treasureCount(){ return Object.keys(S.treasures).length; }
function stageMastered(s){ return s.items.filter(it=>S.mastered[it.w]).length; }
function worldClearedStages(w){ return w.stages.filter(s=>S.cleared[s.id]).length; }
function worldFullyCleared(w){ return w.stages.every(s=>S.cleared[s.id]); }
function worldTreasures(w){ return w.stages.filter(s=>S.treasures[s.tre]).length; }

function xpNeeded(level){ return 30 + level*20; }
function levelInfo(xp){ let level=1, rem=xp; while(rem>=xpNeeded(level)){ rem-=xpNeeded(level); level++; if(level>999)break; } return {level, inLevel:rem, need:xpNeeded(level)}; }

/* ---- fx ---- */
function toast(msg, emoji='🐦'){ const a=document.getElementById('toast-area'); const el=document.createElement('div'); el.className='toast'; el.innerHTML=`<span style="font-size:18px">${emoji}</span><span>${msg}</span>`; a.appendChild(el); setTimeout(()=>{el.style.transition='opacity .4s,transform .4s';el.style.opacity='0';el.style.transform='translateX(-50%) translateY(10px)';},1500); setTimeout(()=>el.remove(),2000); }
function floatGain(el,text,color){ if(!el)return; const r=el.getBoundingClientRect(); const f=document.createElement('div'); f.className='float-gain'; f.textContent=text; f.style.color=color||'#5b8bd9'; f.style.left=(r.left+r.width/2)+'px'; f.style.top=(r.top-4)+'px'; document.body.appendChild(f); setTimeout(()=>f.remove(),1000); }
function confetti(n=22){ if(REDUCED)return; const a=document.getElementById('confetti-area'); const cols=['#5b8bd9','#a9c8f0','#f4a900','#88e0b2','#e8629a','#7d5bd9']; for(let i=0;i<n;i++){ const c=document.createElement('div'); c.className='confetti'; c.style.left=Math.random()*100+'%'; c.style.background=cols[i%cols.length]; c.style.animationDuration=(1.4+Math.random()*1.2)+'s'; c.style.transform=`rotate(${Math.random()*360}deg)`; a.appendChild(c); setTimeout(()=>c.remove(),2800);} }
function vibrate(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

/* ---- HUD ---- */
function renderHUD(){
  const li=levelInfo(S.xp);
  document.getElementById('hud-level').textContent=li.level;
  document.getElementById('hud-xp').style.width=Math.round(li.inLevel/li.need*100)+'%';
  document.getElementById('hud-read').textContent=masteredCount();
  document.getElementById('hud-tre').textContent=treasureCount();
}

/* ---- routing ---- */
function go(s){
  screen=s;
  ['map','battle','result','study','treasure','review'].forEach(v=>document.getElementById(v+'-view').classList.toggle('hidden', v!==s));
  ['map','study','treasure','review'].forEach(v=>{ const b=document.getElementById('nav-'+v); if(b) b.classList.toggle('active', v===s); });
  window.scrollTo({top:0});
  if(s==='map') renderMap();
  if(s==='study') renderStudy();
  if(s==='treasure') renderTreasures();
  if(s==='review') renderReview();
  renderHUD();
}

/* ---- MAP (worlds -> stages) ---- */
function worldUnlocked(idx){ if(idx===0) return true; const p=WORLDS[idx-1]; return worldClearedStages(p) >= Math.min(3, p.stages.length); }
function stageUnlocked(w, sIdx){ if(sIdx===0) return true; return !!S.cleared[w.stages[sIdx-1].id]; }
function toggleWorld(id){ S.openWorld = (S.openWorld===id)?null:id; save(); renderMap(); }

function renderMap(){
  const total=totalCount(), got=masteredCount();
  document.getElementById('overall-bar').style.width=Math.round(got/total*100)+'%';
  document.getElementById('overall-num').textContent=Math.round(got/total*100)+'%';
  document.getElementById('hero-line').textContent = got===0 ? 'さあ、よみの たびに 出発だよ！' :
    got>=total ? 'ぜんぶ 読めた！しままる はかせ！🎓' : `いま ${got}/${total} 個 読めるよ。その調子！`;

  document.getElementById('world-list').innerHTML = WORLDS.map((w,idx)=>{
    const unlocked=worldUnlocked(idx);
    const cs=worldClearedStages(w), ns=w.stages.length;
    const cleared=worldFullyCleared(w), open=S.openWorld===w.id && unlocked;
    const stagesHtml = w.stages.map((s,si)=>{
      const su=stageUnlocked(w,si);
      const sc=!!S.cleared[s.id], pf=!!S.perfect[s.id], tre=!!S.treasures[s.tre];
      const stat = !su ? '🔒' : (sc ? (pf?'⭐パーフェクト':'クリア') : `${stageMastered(s)}/${s.items.length}`);
      return `<div class="stage-row ${su?'':'locked'} ${sc?'cleared':''}" onclick="${su?`startBattle('${s.id}')`:`toast('まえの ステージを クリアすると ひらくよ','🔒')`}">
        <div class="stage-ic">${!su?'🔒':(sc?'✅':'⚔️')}</div>
        <div class="stage-mid2"><div class="stage-nm">${s.name}</div><div class="stage-meta">10語 ・ ${tre?'💎おたからGET':'💎おたから あり'}</div></div>
        <div class="stage-stat">${stat}</div>
      </div>`;
    }).join('');
    return `<div class="world ${unlocked?'':'locked'} ${cleared?'cleared':''} ${open?'open':''}">
      <div class="world-head" onclick="${unlocked?`toggleWorld('${w.id}')`:`toast('まえの ワールドを クリアすると ひらくよ','🔒')`}">
        <div class="world-emoji">${unlocked?w.emoji:'🔒'}</div>
        <div class="world-mid">
          <div class="world-name">${w.name}</div>
          <div class="world-sub">${w.sub}・ステージ ${ns}・漢字 ${ns*10}こ</div>
          <div class="world-bar"><i style="width:${Math.round(cs/ns*100)}%"></i></div>
        </div>
        <div class="world-right"><div>${cleared?'✅':cs+'/'+ns}</div><div class="world-tre">💎${worldTreasures(w)}/${ns}</div><div class="world-caret">▶</div></div>
      </div>
      <div class="stages">${stagesHtml}</div>
    </div>`;
  }).join('');
}

/* ---- BATTLE ---- */
function buildChoices(item, pool){
  const opts=[item.r];
  const others=shuffle(pool.filter(p=>p.r!==item.r).map(p=>p.r));
  for(const o of others){ if(opts.length>=4) break; if(!opts.includes(o)) opts.push(o); }
  return shuffle(opts);
}
function startBattle(stageId){
  const st=stageById(stageId); if(!st) return;
  const w=worldById(st.world);
  const items=shuffle([...st.items]);
  const queue=items.map(it=>({it, boss:false, requeued:false}));
  if(SESSION_BOSS) queue.push({it:items[Math.floor(Math.random()*items.length)], boss:true, requeued:false});
  // ステージ内の隠しおたから: ボス以外の1問にセット
  const treasureAt = Math.floor(Math.random()*items.length);
  battle={ mode:'stage', stageId, world:st.world, tre:st.tre, pool:worldItems(w), queue, qi:0, score:0, wrong:0, answered:false, treasureAt, gotTreasure:false };
  go('battle'); renderBattle();
}
function startReview(){
  const weak=allItems().filter(it=> (S.entries[it.w]?.seen||0)>0 && !S.mastered[it.w]);
  let pool = weak.length>=4 ? weak : allItems().filter(it=>!S.mastered[it.w]);
  if(pool.length<4) pool=allItems();
  const items=shuffle([...pool]).slice(0,12);
  battle={ mode:'review', pool:allItems(), queue:items.map(it=>({it,boss:false,requeued:false})), qi:0, score:0, wrong:0, answered:false, treasureAt:-1, gotTreasure:false };
  go('battle'); renderBattle();
}
function renderBattle(){
  const cur=battle.queue[battle.qi];
  document.getElementById('battle-prog').style.width=Math.round(battle.qi/battle.queue.length*100)+'%';
  document.getElementById('battle-score').textContent=battle.score;
  const choices=buildChoices(cur.it, battle.pool);
  const isTre = battle.mode==='stage' && battle.qi===battle.treasureAt && !cur.boss && !battle.gotTreasure;
  const monEmoji = cur.boss?'🐲':(isTre?'🎁':MON[(battle.qi+cur.it.w.length)%MON.length]);
  battle.answered=false;
  battle._isTre=isTre;
  document.getElementById('battle-body').innerHTML=`
    <div class="monster ${cur.boss?'boss':''} ${isTre?'treasure':''}">
      ${cur.boss?'<div class="mon-tag boss">⚔️ ボス かんじ</div>':''}
      ${isTre?'<div class="mon-tag tre">🎁 たからばこを まもる かんじ</div>':''}
      <div class="mon-emoji">${monEmoji}</div>
      <div class="mon-ask">この ことば、なんて 読む？</div>
      <div class="mon-word">${cur.it.w}</div>
    </div>
    <div class="choices" id="choices">
      ${choices.map(c=>`<button class="choice" onclick="answer(this,'${c}')">${c}</button>`).join('')}
    </div>
    <div id="fb-area"></div>`;
}
function answer(btn, choice){
  if(battle.answered) return;
  battle.answered=true;
  const cur=battle.queue[battle.qi];
  const correct = choice===cur.it.r;
  const e = S.entries[cur.it.w] || {seen:0, correct:0};
  e.seen++;
  document.querySelectorAll('#choices .choice').forEach(b=>{
    b.disabled=true;
    if(b.textContent===cur.it.r) b.classList.add('correct');
    else if(b===btn && !correct) b.classList.add('wrong');
  });
  let gain=0, treHit=false;
  if(correct){
    e.correct++; gain=cur.boss?16:10;
    if(e.correct>=2 && !S.mastered[cur.it.w]){ S.mastered[cur.it.w]=true; gain+=6; }
    if(battle._isTre){ battle.gotTreasure=true; treHit=true; gain+=8; }
    S.xp+=gain; battle.score+=gain;
    floatGain(btn, `+${gain}`, '#2f9e5c'); confetti(cur.boss?22:(treHit?20:12)); vibrate(14);
  }else{
    battle.wrong++; gain=2; S.xp+=gain;   // 参加賞（罰しない）
    floatGain(btn, '+2', '#e8629a'); vibrate(10);
    if(!cur.requeued){ battle.queue.push({it:cur.it, boss:false, requeued:true}); }
  }
  S.entries[cur.it.w]=e;
  save(); renderHUD();
  document.getElementById('fb-area').innerHTML=`
    <div class="feedback">
      ${correct?`<div class="fb-good">${cur.boss?'ボスを なかまに した！🎉':'せいかい！🐦'}</div>`
               :`<div class="fb-bad">ざんねん！でも だいじょうぶ 🐦</div>`}
      <div class="fb-read">${cur.it.w}　→　${cur.it.r}</div>
      <div class="fb-mean">${cur.it.m}</div>
      ${treHit?'<div class="fb-tre">🎁 たからばこ はっけん！ステージクリアで GETできるよ💎</div>':''}
      <div class="fb-next"><button class="big-btn ${correct?'green':''}" onclick="nextQuestion()">つぎへ ▶</button></div>
    </div>`;
  document.getElementById('fb-area').scrollIntoView({behavior:'smooth', block:'center'});
}
function nextQuestion(){
  battle.qi++;
  document.getElementById('battle-prog').style.width=Math.round(battle.qi/battle.queue.length*100)+'%';
  if(battle.qi>=battle.queue.length){ finishBattle(); return; }
  renderBattle();
}
function quitBattle(){ go('map'); }
function finishBattle(){
  let emoji, title, story='', reward='', treHtml='';
  if(battle.mode==='stage'){
    const st=stageById(battle.stageId), w=worldById(battle.world);
    const wasCleared=!!S.cleared[battle.stageId];
    const perfect = battle.wrong===0;
    S.cleared[battle.stageId]=true;
    if(perfect) S.perfect[battle.stageId]=true;
    // おたから獲得（ステージ初クリア or 既存。perfectでキラに昇格）
    const tre=TREASURES[battle.tre];
    const had = S.treasures[battle.tre];
    if(!had){ S.treasures[battle.tre]={kira:perfect, date:Date.now()}; }
    else if(perfect && !had.kira){ S.treasures[battle.tre].kira=true; }
    const kira = S.treasures[battle.tre].kira;
    treHtml = `<div class="tre-card">
      <div class="tre-chest">🧰</div>
      <div class="tre-emoji">${tre.e}</div>
      <div class="tre-name">${tre.n} を てにいれた！</div>
      <div class="tre-desc">${tre.d}</div>
      ${kira?'<div class="tre-kira">✨ キラ ✨（パーフェクト！）</div>':''}
    </div>`;
    const bonus = wasCleared?5:20;
    S.xp += bonus + (perfect?10:0);
    emoji = perfect?'⭐':'🎊';
    title = perfect?`${st.name} パーフェクト！`:`${st.name} クリア！`;
    reward = `⭐ このバトル ${battle.score}　＋ ボーナス ${bonus+(perfect?10:0)}XP`;
    // ワールドクリア・解放の案内
    if(worldFullyCleared(w)) story += `🏆「${w.name}」を ぜんステージ クリア！\n`;
    const widx=WORLDS.findIndex(x=>x.id===w.id);
    if(worldFullyCleared(w) && widx<WORLDS.length-1) story += `🔓 つぎのワールド「${WORLDS[widx+1].name}」が ひらいたよ！\n`;
    story += STORY[w.id]||'';
    S.openWorld = w.id;
    confetti(perfect?40:30); vibrate(40);
  }else{
    emoji='🔁'; title='ふくしゅう かんりょう！'; reward=`⭐ ${battle.score} ポイント`;
    story='にがてな漢字に また であえたね。よめるように なってきてるよ🐦';
    confetti(22);
  }
  save(); renderHUD();
  document.getElementById('result-body').innerHTML=`
    <div class="result">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${title}</div>
      ${treHtml}
      <div class="result-story">${story.replace(/\n/g,'<br>')}</div>
      <div class="result-reward">${reward}</div>
      <button class="big-btn green" onclick="go('map')">地図に もどる 🗺️</button>
      <div style="height:10px"></div>
      <button class="big-btn gold" onclick="go('treasure')">おたからを みる 💎</button>
    </div>`;
  go('result');
}

/* ---- STUDY ---- */
function renderStudy(){
  document.getElementById('study-seg').innerHTML=WORLDS.map(w=>`<button class="seg-btn ${S.studyWorld===w.id?'active':''}" onclick="setStudyWorld('${w.id}')">${w.emoji}${w.name}</button>`).join('');
  const w=worldById(S.studyWorld);
  const items=worldItems(w);
  document.getElementById('study-count').textContent=`${w.name}・${items.length}こ（読めた ${items.filter(it=>S.mastered[it.w]).length}）`;
  document.getElementById('furi-btn').textContent = S.furiHidden ? 'よみを みせる' : 'よみを かくす';
  document.getElementById('study-list').innerHTML=w.stages.map(s=>
    `<div class="muted" style="font-weight:900;color:var(--plum);margin:10px 0 2px">${s.name}</div>`+
    s.items.map(it=>`
      <div class="kanji-row">
        <div class="kr-word">${it.w}</div>
        <div class="kr-mid">
          <div class="kr-read ${S.furiHidden?'read-hidden':''}" onclick="this.classList.remove('read-hidden')">${it.r}</div>
          <div class="kr-mean">${it.m}</div>
        </div>
        <div class="kr-mark">${S.mastered[it.w]?'✅':'⬜'}</div>
      </div>`).join('')
  ).join('');
}
function setStudyWorld(id){ S.studyWorld=id; save(); renderStudy(); }
function toggleFuri(){ S.furiHidden=!S.furiHidden; save(); renderStudy(); }

/* ---- TREASURES ---- */
function renderTreasures(){
  const ids=Object.keys(TREASURES);
  const got=treasureCount();
  document.getElementById('tre-count').textContent=`あつめた おたから：${got} / ${ids.length}`;
  document.getElementById('tre-grid').innerHTML=ids.map(id=>{
    const t=TREASURES[id], have=S.treasures[id];
    if(!have) return `<div class="tre-cell locked"><div class="e">${t.e}</div><div class="n">？？？</div></div>`;
    return `<div class="tre-cell" onclick="toast('${t.n}：${t.d}','${t.e}')">${have.kira?'<div class="k">✨</div>':''}<div class="e">${t.e}</div><div class="n">${t.n}</div></div>`;
  }).join('');
}

/* ---- REVIEW ---- */
function renderReview(){
  const weak=allItems().filter(it=> (S.entries[it.w]?.seen||0)>0 && !S.mastered[it.w]);
  const info=document.getElementById('review-info'), btn=document.getElementById('review-start');
  if(weak.length){ info.textContent=`にがて・あやしい漢字が ${weak.length}こ`; btn.textContent=`にがてな漢字 ${Math.min(weak.length,12)}こ を ふくしゅう`; }
  else { info.textContent='いまは にがてなし！まだの漢字から出すよ'; btn.textContent='まだの漢字を ふくしゅうする'; }
}

/* ---- init ---- */
renderHUD();
renderMap();
</script>
</body>
</html>
